name: Bug Finder Scan

on: [push, pull_request]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Bug Finder
        run: pip install bugfinder-rahulsahuindia
      
      - name: Run Scan
        run: bugfinder .
