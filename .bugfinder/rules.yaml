# Custom rules for bug finder tool
- id: NO_HARDCODED_KEYS
  name: "Hardcoded AWS Access Key"
  pattern: "AKIA[0-9A-Z]{16}"
  language: generic
  message: "Hardcoded AWS Access Key ID detected"
  severity: critical
  description: "AWS Access Keys should never be hardcoded in source code."
  remediation: "Move the key to environment variables or use AWS Secrets Manager."
  cwe: "CWE-798"
  owasp: "A3:2017"

- id: SQL_INJECTION_PYTHON
  name: "Potential SQL Injection"
  pattern: "execute\\(f.*\\{.*\\}.*\\)"
  language: python
  message: "Potential SQL injection – use parameterized queries"
  severity: high
  description: "String formatting in SQL query can lead to injection."
  remediation: "Use parameterized queries with ? or %s placeholders."

- id: DEBUG_MODE
  name: "Debug Mode Enabled"
  pattern: "app\\.debug\\s*=\\s*True"
  language: python
  message: "Debug mode should be disabled in production"
  severity: medium
  description: "Flask/Django debug mode leaks sensitive information."
  remediation: "Set DEBUG = False in production config."

- id: PRIVATE_KEY_LEAK
  pattern: "-----BEGIN (RSA|DSA|EC|OPENSSH) PRIVATE KEY-----"
  language: generic
  message: "Private key found in source code"
  severity: critical
  remediation: "Remove the key and use a secrets management service."
